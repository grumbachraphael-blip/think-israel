<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #001f3f; 
            color: white;
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            background: #002b55;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 116, 217, 0.4);
            z-index: 5;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #001226;
            border: 1px solid #0074D9;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 17px;
            font-family: 'Assistant', sans-serif;
            margin: 20px 0;
            resize: none;
            outline: none;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 14px 60px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
        }

        #score-zone {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
        }

        /* מגן דוד קלאסי וסימטרי */
        .magen-david-svg {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 0 5px rgba(0, 116, 217, 0.3));
        }

        #score-count {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes hero-move {
            0% {
                top: 50%; right: 50%;
                transform: translate(50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            40% {
                top: 50%; right: 50%;
                transform: translate(50%, -50%) scale(4.5) rotate(720deg);
                opacity: 1;
            }
            100% {
                top: 25px; right: 25px;
                transform: translate(0, 0) scale(1) rotate(1440deg);
                opacity: 1;
            }
        }

        @keyframes infinite-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animating {
            position: fixed !important;
            visibility: visible !important;
            animation: hero-move 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .spinning-svg {
            animation: infinite-spin 10s linear infinite !important;
            transform-origin: center center;
        }

        #feedback { margin-top: 20px; font-size: 1.1rem; min-height: 1.5em; }
    </style>
</head>
<body>

    <div id="score-zone">
        <svg class="magen-david-svg" id="magen-svg" viewBox="0 0 100 100">
            <path d="M50 5 L90 72 L10 72 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
            <path d="M50 95 L10 28 L90 28 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
        </svg>
        <div id="score-count">0</div>
    </div>

    <div class="container">
        <h1>think-israel</h1>
        <p>אם שואלים אותך למה אתם עושים גנוסייד בעזה, מה ואיך היית עונה?</p>
        <textarea id="userAnswer" placeholder="כתבו כאן תשובה מכבדת ומשכנעת..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">שלח לבדיקה</button>
        <div id="feedback"></div>
    </div>

    <script>
        let score = 0;
        let lastAnswer = "";

        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value.trim();
            const feedbackDiv = document.getElementById('feedback');
            const scoreZone = document.getElementById('score-zone');
            const magenSvg = document.getElementById('magen-svg');
            const scoreNum = document.getElementById('score-count');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer) return;

            btn.disabled = true;
            feedbackDiv.innerHTML = "מנתח תשובה...";
            
            scoreZone.classList.remove("animating");
            magenSvg.classList.remove("spinning-svg");
            scoreNum.style.opacity = "0";
            void scoreZone.offsetWidth; 

            const apiKey = "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";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `ענה ב-JSON בלבד: {"isCorrect": boolean, "feedback": "string"}. האם התשובה מכבדת: "${userAnswer}"` }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40";
                    feedbackDiv.innerHTML = "✅ " + result.feedback;

                    if (userAnswer !== lastAnswer) {
                        score++;
                        lastAnswer = userAnswer;
                    }

                    scoreZone.classList.add("animating");

                    setTimeout(() => {
                        magenSvg.classList.add("spinning-svg");
                        scoreNum.innerText = score;
                        scoreNum.style.opacity = "1";
                    }, 2500);

                } else {
                    feedbackDiv.style.color = "#FF4136";
                    feedbackDiv.innerHTML = "❌ " + result.feedback;
                }
            } catch (e) {
                feedbackDiv.innerText = "שגיאה בחיבור.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
