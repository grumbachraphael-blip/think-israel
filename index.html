<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בדיקה AI</title>
    <style>
        body {
            background-color: #001f3f; /* כחול כהה */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #003366;
            border: 2px solid #0074D9;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover { background-color: #7FDBFF; }

        /* אנימציית מגן דוד */
        #star-container {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 40px;
            display: none;
        }

        .rotating-star {
            display: inline-block;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #feedback { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="star-container">✡️</div>

    <div class="container">
        <h2>שאלה:</h2>
        <p>אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת ומשכנעת?</p>
        
        <textarea id="userAnswer" placeholder="כתוב את תשובתך כאן..."></textarea>
        <br>
        <button onclick="checkAnswer()">שלח לבדיקה</button>
        
        <div id="feedback"></div>
    </div>

    <script>
async function checkAnswer() {
    const userAnswer = document.getElementById('userAnswer').value;
    const feedbackDiv = document.getElementById('feedback');
    const starContainer = document.getElementById('star-container');
    
    if (!userAnswer) {
        alert("נא לכתוב תשובה");
        return;
    }

    feedbackDiv.innerText = "ה-AI בודק את תשובתך...";
    feedbackDiv.style.color = "white";
    
    const apiKey = "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"; 
    
    const prompt = `
        אתה בוחן רטוריקה. המשימה של המשתמש היא לענות על השאלה: "איך להסביר את המצב בעזה בצורה מכבדת עם טיעונים חזקים?".
        בדוק את תשובת המשתמש לפי הקריטריונים:
        1. שפה מכבדת ולא מתלהמת.
        2. שימוש בטיעונים עובדתיים או לוגיים חזקים.
        
        תשובת המשתמש: "${userAnswer}"
        
        ענה בפורמט JSON בלבד:
        {"isCorrect": true/false, "feedback": "הסבר קצר"}
    `;

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "user", content: prompt }],
                response_format: { type: "json_object" }
            })
        });

        const data = await response.json();
        const result = JSON.parse(data.choices[0].message.content);

        if (result.isCorrect) {
            feedbackDiv.style.color = "#2ECC40";
            feedbackDiv.innerText = "כל הכבוד! " + result.feedback;
            starContainer.style.display = "block";
            starContainer.classList.add("rotating-star");
        } else {
            feedbackDiv.style.color = "#FF4136";
            feedbackDiv.innerText = "צריך לשפר: " + result.feedback;
            starContainer.style.display = "none";
        }
    } catch (error) {
        console.error(error);
        feedbackDiv.innerText = "שגיאה בחיבור ל-AI. וודא שהמפתח תקין.";
    }
}
</script>
</body>
</html>
