<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel | סימולטור הסברה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0074D9;
            --dark-bg: #001f3f;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Assistant', sans-serif; /* פונט נעים לעין */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.07);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5;
            backdrop-filter: blur(10px);
        }

        h1 { font-weight: 700; margin-bottom: 10px; }
        p { font-weight: 300; font-size: 1.1rem; opacity: 0.9; }

        textarea {
            width: 100%;
            height: 140px;
            background: #002b55;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Assistant', sans-serif;
            margin: 20px 0;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--primary-blue); }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,116,217,0.4); }
        button:disabled { background-color: #444; cursor: not-allowed; transform: none; }

        /* אזור המונה והמגן דוד בפינה השמאלית העליונה */
        #score-zone {
            position: fixed;
            top: 20px;
            left: 20px; /* שמאלה למעלה */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            visibility: hidden; /* מוסתר עד ההצלחה הראשונה */
        }

        #magen-david-img {
            width: 60px;
            height: 60px;
        }

        #score-count {
            font-size: 20px;
            font-weight: 700;
            margin-top: 5px;
            color: #FFD700; /* צבע זהב למספר */
        }

        /* אנימציה ראשונית: מהמרכז לכל המסך ואז לפינה */
        @keyframes hero-entrance {
            0% {
                top: 50%; left: 50%;
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                top: 50%; left: 50%;
                transform: translate(-50%, -50%) scale(6) rotate(360deg);
                opacity: 1;
            }
            100% {
                top: 20px; left: 20px;
                transform: translate(0, 0) scale(1) rotate(720deg);
                opacity: 1;
            }
        }

        /* סיבוב קבוע */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animating {
            position: fixed !important;
            visibility: visible !important;
            animation: hero-entrance 2.5s ease-in-out forwards;
        }

        .spinning {
            animation: spin 6s linear infinite;
        }

        #feedback { margin-top: 25px; font-weight: 400; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="score-zone">
        <img id="magen-david-img" src="magen-david.png" alt="Magen David">
        <div id="score-count">0</div>
    </div>

    <div class="container">
        <h1>סימולטור הסברה</h1>
        <p>שאלה: "אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת עם טיעונים חזקים?"</p>
        <textarea id="userAnswer" placeholder="כתבו כאן את תשובתכם המנומקת..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">בדיקת תשובה</button>
        <div id="feedback"></div>
    </div>

    <script>
        let score = 0;

        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value;
            const feedbackDiv = document.getElementById('feedback');
            const scoreZone = document.getElementById('score-zone');
            const magenImg = document.getElementById('magen-david-img');
            const scoreDisplay = document.getElementById('score-count');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer.trim()) {
                alert("נא להזין תשובה");
                return;
            }

            btn.disabled = true;
            feedbackDiv.style.color = "white";
            feedbackDiv.innerHTML = "מנתח תשובה באמצעות AI...";

            const apiKey = "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";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `ענה ב-JSON בלבד. האם התשובה הבאה מכבדת ומשכנעת לגבי עזה? "${userAnswer}". מבנה: {"isCorrect": boolean, "feedback": "string"}` }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    score++;
                    feedbackDiv.style.color = "#2ECC40";
                    feedbackDiv.innerHTML = "✨ " + result.feedback;

                    // ניהול האנימציה
                    scoreDisplay.innerText = score;
                    scoreZone.classList.remove("animating");
                    magenImg.classList.remove("spinning");
                    void scoreZone.offsetWidth; // Trigger reflow
                    
                    scoreZone.classList.add("animating");

                    // בסיום האנימציה (2.5 שניות), להתחיל להסתובב קבוע
                    setTimeout(() => {
                        magenImg.classList.add("spinning");
                    }, 2500);

                } else {
                    feedbackDiv.style.color = "#FF4136";
                    feedbackDiv.innerHTML = "❌ " + result.feedback;
                }
            } catch (e) {
                feedbackDiv.innerText = "שגיאה בתקשורת.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
