<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think-Israel | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #0074D9; --dark-bg: #001f3f; --card-bg: #002b55; --success: #2ECC40; }
        body {
            background-color: var(--dark-bg); color: white; font-family: 'Assistant', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
            overflow-x: hidden;
        }
        .container {
            text-align: center; width: 100%; max-width: 600px; background: var(--card-bg);
            padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 116, 217, 0.4); margin-top: 50px; z-index: 5;
        }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { cursor: pointer; padding: 10px; opacity: 0.6; transition: 0.3s; font-weight: bold; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--main-blue); color: var(--main-blue); }
        
        select {
            width: 100%; padding: 12px; border-radius: 10px; background: #001226; 
            color: white; border: 1px solid var(--main-blue); margin-bottom: 20px; font-family: 'Assistant';
        }
        option:disabled { color: var(--success); background: #002b55; }

        textarea {
            width: 100%; height: 140px; background: #001226; border: 1px solid var(--main-blue);
            color: white; padding: 15px; border-radius: 12px; font-size: 16px;
            font-family: 'Assistant'; resize: none; outline: none; box-sizing: border-box;
        }
        button {
            background-color: var(--main-blue); color: white; border: none; padding: 14px 60px;
            border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: 700; margin-top: 15px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* אנימציית המגן דוד */
        #score-zone { 
            position: fixed; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            visibility: hidden; 
            z-index: 1000;
        }
        .magen-david-svg { width: 80px; height: 80px; filter: drop-shadow(0 0 10px var(--main-blue)); }
        #score-count { font-size: 28px; font-weight: 700; color: #FFD700; margin-top: 5px; opacity: 0; }

        @keyframes hero-move {
            0% { top: 50%; right: 50%; transform: translate(50%, -50%) scale(0) rotate(0deg); opacity: 0; visibility: visible; }
            40% { top: 50%; right: 50%; transform: translate(50%, -50%) scale(4.5) rotate(720deg); opacity: 1; }
            100% { top: 25px; right: 25px; transform: translate(0, 0) scale(1) rotate(1440deg); opacity: 1; visibility: visible; }
        }

        /* סיבוב אינסופי בפינה */
        @keyframes infinite-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animating { animation: hero-move 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .spinning-svg { animation: infinite-spin 10s linear infinite !important; }
        .show-score { opacity: 1 !important; transition: opacity 0.5s; }
        
        #feedback { margin-top: 20px; font-weight: bold; min-height: 1.5em; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="score-zone">
    <svg class="magen-david-svg" id="magen-svg" viewBox="0 0 100 100">
        <path d="M50 2 L95 70 L5 70 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
        <path d="M50 98 L5 30 L95 30 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
    </svg>
    <div id="score-count">0</div>
</div>

<div class="container">
    <h1>Think-Israel</h1>
    <p>ענו נכון על השאלות כדי "לכבוש" אותן:</p>

    <div class="tabs">
        <div class="tab active" onclick="switchCategory('personality', this)">אישיות</div>
        <div class="tab" onclick="switchCategory('history', this)">היסטוריה</div>
        <div class="tab" onclick="switchCategory('politics', this)">פוליטיקה</div>
        <div class="tab" onclick="switchCategory('criticism', this)">ביקורת</div>
    </div>

    <select id="questionSelect" onchange="clearTextArea()"></select>
    
    <textarea id="userAnswer" placeholder="כתבו כאן את תשובת ההסברה שלכם..."></textarea>
    <br>
    <button id="checkBtn" onclick="checkAnswer()">שלח לבדיקה</button>
    <div id="feedback"></div>
</div>

<script>
    const questions = {
        personality: [
            "למה המדינה מחייבת את כולם להתגייס, ואיך זה משפיע על מי שלא רוצה?",
            "איך אתם מסבירים את זה שאתם מתגייסים לצבא שבעולם רואים אותו כצבא טרור?",
            "מה זה בכלל אומר להיות 'ציוני' ב-2026?",
            "למה יש תמיכה כל כך רחבה במה שקורה בעזה?",
            "למה יש תחושה שיהודים חושבים שהם 'יותר טובים' מאחרים?"
        ],
        history: [
            "מאיפה הביטחון שהארץ הזאת שייכת לכם?",
            "למה גירשתם המון ערבים ב-1948?",
            "למה דווקא היהודים קיבלו מדינה על חשבון מי שגר פה?",
            "למה כבשתם שטח כל כך גדול ב-67'?",
            "למה ישראל נכנסה למלחמות בלבנון אם הם לא תקפו קודם?"
        ],
        politics: [
            "למה באמת אין שלום עם הפלסטינים?",
            "למה ישראל ממשיכה לתקוף בעזה שוב ושוב?",
            "מה האינטרס האמיתי של ארצות הברית לתמוך בישראל?",
            "מי באמת אשם בבלגן שיש במזרח התיכון?",
            "למה ישראל לא פשוט מניחה את הנשק ומפסיקה להילחם?"
        ],
        criticism: [
            "האם צה\"ל באמת פוגע בילדים בכוונה?",
            "האם היהודים משתמשים בשואה כדי לקבל חסינות מהעולם?",
            "איך ישראל מגיבה לטענה שהיא מבצעת רצח עם בעזה?",
            "האם ישראל ביימה את אירועי ה-7 באוקטובר?",
            "למה בעולם משווים את ישראל לגרמניה הנאצית?"
        ]
    };

    // מערך לשמירת שאלות שכבר נענו נכון
    let completedQuestions = [];
    let currentCategory = 'personality';
    let score = 0;

    function clearTextArea() {
        const select = document.getElementById('questionSelect');
        const answerBox = document.getElementById('userAnswer');
        const btn = document.getElementById('checkBtn');
        
        answerBox.value = "";
        document.getElementById('feedback').innerHTML = "";

        // אם השאלה כבר הושלמה, ננעל את הכפתור והתיבה
        if (completedQuestions.includes(select.value)) {
            answerBox.disabled = true;
            answerBox.placeholder = "כבר ענית נכון על שאלה זו! ✅";
            btn.disabled = true;
        } else {
            answerBox.disabled = false;
            answerBox.placeholder = "כתבו כאן את תשובת ההסברה שלכם...";
            btn.disabled = false;
        }
    }

    function switchCategory(cat, el) {
        currentCategory = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderQuestions();
        clearTextArea();
    }

    function renderQuestions() {
        const select = document.getElementById('questionSelect');
        select.innerHTML = questions[currentCategory].map(q => {
            const isDone = completedQuestions.includes(q);
            return `<option value="${q}" ${isDone ? 'disabled' : ''}>${isDone ? '✅ ' : ''}${q}</option>`;
        }).join('');
    }

    async function checkAnswer() {
        const answer = document.getElementById('userAnswer').value.trim();
        const select = document.getElementById('questionSelect');
        const question = select.value;
        const feedbackDiv = document.getElementById('feedback');
        const btn = document.getElementById('checkBtn');
        const scoreZone = document.getElementById('score-zone');
        const magenSvg = document.getElementById('magen-svg');
        const scoreNum = document.getElementById('score-count');

        if (!answer) return;
        
        btn.disabled = true;
        feedbackDiv.style.color = "white";
        feedbackDiv.innerHTML = "מנתח תשובה בשרת...";

        // איפוס אנימציה
        scoreZone.classList.remove("animating");
        magenSvg.classList.remove("spinning-svg");
        scoreNum.classList.remove("show-score");
        void scoreZone.offsetWidth; 

        try {
            const response = await fetch("/api/check-answer", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question, answer })
            });
            const result = await response.json();

            if (result.isCorrect) {
                feedbackDiv.style.color = "#2ECC40";
                feedbackDiv.innerHTML = "✅ " + result.feedback;
                
                // הוספה לרשימת המושלמים
                completedQuestions.push(question);
                renderQuestions(); // עדכון ה-V בתפריט
                
                score++;
                scoreNum.innerText = score;
                
                // אנימציה
                scoreZone.classList.add("animating");
                setTimeout(() => {
                    scoreNum.classList.add("show-score");
                    magenSvg.classList.add("spinning-svg"); // סיבוב אינסופי בפינה
                }, 2500);

                // נעילת השאלה
                document.getElementById('userAnswer').disabled = true;
            } else {
                feedbackDiv.style.color = "#FF4136";
                feedbackDiv.innerHTML = "❌ " + result.feedback;
                btn.disabled = false;
            }
        } catch (e) {
            feedbackDiv.innerHTML = "שגיאה בחיבור לשרת.";
            btn.disabled = false;
        }
    }

    renderQuestions();
</script>
</body>
</html>
