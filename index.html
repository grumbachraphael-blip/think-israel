<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #001f3f; /* רקע כחול מעט בהיר יותר */
            color: white;
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            background: #002b55; /* תיבה כהה על רקע בהיר יותר */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 116, 217, 0.4);
            z-index: 5;
        }

        h1 { font-weight: 700; color: #7FDBFF; margin-top: 0; }
        
        textarea {
            width: 100%;
            height: 120px;
            background: #001226;
            border: 1px solid #0074D9;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 17px;
            font-family: 'Assistant', sans-serif;
            margin: 20px 0;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 14px 60px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: 0.3s;
        }

        button:hover { background-color: #7FDBFF; color: #001f3f; }
        button:disabled { background-color: #333; opacity: 0.6; }

        /* אזור הניקוד - ימין למעלה */
        #score-zone {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
        }

        #magen-david-img {
            width: 70px;
            height: 70px;
            object-fit: contain; /* שומר על איכות התמונה */
            image-rendering: -webkit-optimize-contrast; /* מונע טשטוש לבן */
        }

        #score-count {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* אנימציה מהמרכז לפינה */
        @keyframes hero-to-corner {
            0% {
                top: 50%; left: 50%;
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                top: 50%; left: 50%;
                transform: translate(-50%, -50%) scale(4) rotate(360deg);
                opacity: 1;
            }
            100% {
                top: 25px; left: calc(100% - 95px);
                transform: translate(0, 0) scale(1) rotate(720deg);
                opacity: 1;
            }
        }

        @keyframes simple-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animating {
            position: fixed !important;
            visibility: visible !important;
            animation: hero-to-corner 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .spinning {
            animation: simple-spin 12s linear infinite !important;
        }

        #feedback { margin-top: 20px; font-size: 1.1rem; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="score-zone">
        <img id="magen-david-img" src="magen-david.png" alt="Magen David">
        <div id="score-count">0</div>
    </div>

    <div class="container">
        <h1>think-israel</h1>
        <p>אם שואלים אותך למה אתם עושים גנוסייד בעזה, מה ואיך היית עונה?</p>
        <textarea id="userAnswer" placeholder="כתבו כאן תשובה מכבדת ומשכנעת..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">שלח לבדיקה</button>
        <div id="feedback"></div>
    </div>

    <script>
        let score = 0;
        let alreadyPassed = false; // משתנה למניעת כפילות ניקוד

        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value;
            const feedbackDiv = document.getElementById('feedback');
            const scoreZone = document.getElementById('score-zone');
            const magenImg = document.getElementById('magen-david-img');
            const scoreNum = document.getElementById('score-count');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer.trim()) return;

            btn.disabled = true;
            feedbackDiv.style.color = "white";
            feedbackDiv.innerHTML = "ה-AI מנתח...";

            // איפוס ויזואלי של האנימציה
            scoreZone.classList.remove("animating");
            magenImg.classList.remove("spinning");
            scoreNum.style.opacity = "0";
            void scoreZone.offsetWidth; 

            const apiKey = "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";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `ענה ב-JSON בלבד. האם התשובה מכבדת ומשכנעת? "${userAnswer}". מבנה: {"isCorrect": boolean, "feedback": "string"}` }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40";
                    feedbackDiv.innerHTML = "✅ " + result.feedback;

                    // העלאת הניקוד רק אם זו פעם ראשונה שהוא מצליח
                    if (!alreadyPassed) {
                        score++;
                        alreadyPassed = true; 
                    }

                    // הפעלת האנימציה
                    scoreZone.classList.add("animating");

                    setTimeout(() => {
                        magenImg.classList.add("spinning");
                        scoreNum.innerText = score;
                        scoreNum.style.opacity = "1"; // המספר מופיע רק כשהמגן דוד בפינה
                    }, 2200);

                } else {
                    feedbackDiv.style.color = "#FF4136";
                    feedbackDiv.innerHTML = "❌ " + result.feedback;
                }
            } catch (e) {
                feedbackDiv.innerText = "שגיאה בחיבור.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
