<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <style>
        body {
            background-color: #001f3f; /* כחול כהה */
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #003366;
            border: 2px solid #0074D9;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin: 20px 0;
            resize: none;
            outline: none;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #005bb5; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        /* מגן דוד SVG */
        #corner-star {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            display: none; /* יופיע רק בהצלחה */
            z-index: 10;
        }

        /* אנימציה של סיבוב והגדלה */
        @keyframes spin-grow {
            0% { transform: rotate(0deg) scale(0); opacity: 0; }
            100% { transform: rotate(720deg) scale(1.2); opacity: 1; }
        }

        .animate-star {
            display: block !important;
            animation: spin-grow 1.5s ease-out forwards;
        }

        #feedback { margin-top: 20px; line-height: 1.5; font-size: 18px; }
    </style>
</head>
<body>

    <svg id="corner-star" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5 L85 75 L15 75 Z" fill="none" stroke="#0074D9" stroke-width="5"/>
        <path d="M50 95 L15 25 L85 25 Z" fill="none" stroke="#0074D9" stroke-width="5"/>
    </svg>

    <div class="container">
        <h1>סימולטור הסברה</h1>
        <p>שאלה: "אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת עם טיעונים חזקים?"</p>
        
        <textarea id="userAnswer" placeholder="הקלד את תשובתך כאן..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">בדיקת תשובה</button>
        
        <div id="feedback"></div>
    </div>

    <script>
        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value;
            const feedbackDiv = document.getElementById('feedback');
            const star = document.getElementById('corner-star');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer.trim()) {
                alert("בבקשה כתוב תשובה לפני הבדיקה");
                return;
            }

            // איפוס מצב
            btn.disabled = true;
            star.classList.remove("animate-star");
            feedbackDiv.style.color = "white";
            feedbackDiv.innerHTML = "ה-AI מנתח את התשובה שלך... ✨";

            const apiKey = "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";

            const prompt = `
                תפקיד: בוחן רטוריקה והסברה ישראלית.
                משימה: בדוק האם התשובה הבאה לשאלה על עזה היא מכבדת, משכנעת ובעלת טיעונים חזקים.
                
                תשובת המשתמש: "${userAnswer}"
                
                החזר JSON בלבד במבנה הבא:
                {"isCorrect": true/false, "feedback": "הסבר קצר מאוד בעברית"}
            `;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        response_format: { type: "json_object" },
                        temperature: 0.5
                    })
                });

                if (!response.ok) throw new Error("API limit or error");

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40"; // ירוק
                    feedbackDiv.innerHTML = "✅ <b>מעולה!</b> " + result.feedback;
                    
                    // הפעלת האנימציה של המגן דוד
                    star.classList.add("animate-star");
                } else {
                    feedbackDiv.style.color = "#FF4136"; // אדום
                    feedbackDiv.innerHTML = "❌ <b>כדאי לשפר:</b> " + result.feedback;
                }
            } catch (error) {
                console.error(error);
                feedbackDiv.innerText = "שגיאה בחיבור ל-AI. נסה שוב בעוד רגע.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
