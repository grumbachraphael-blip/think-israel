<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #001f3f; color: white; font-family: 'Assistant', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .container {
            text-align: center; width: 90%; max-width: 500px; background: #002b55;
            padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 116, 217, 0.4); z-index: 5;
        }
        textarea {
            width: 100%; height: 120px; background: #001226; border: 1px solid #0074D9;
            color: white; padding: 15px; border-radius: 12px; font-size: 17px;
            font-family: 'Assistant', sans-serif; margin: 20px 0; resize: none; outline: none;
        }
        button {
            background-color: #0074D9; color: white; border: none; padding: 14px 60px;
            border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: 700;
        }
        button:disabled { opacity: 0.6; }
        #score-zone {
            position: fixed; top: 25px; right: 25px; display: flex;
            flex-direction: column; align-items: center; z-index: 1000; visibility: hidden;
        }
        .magen-david-svg { width: 70px; height: 70px; filter: drop-shadow(0 0 5px rgba(0, 116, 217, 0.3)); }
        #score-count { font-size: 28px; font-weight: 700; color: #FFD700; margin-top: 5px; opacity: 0; transition: opacity 0.5s; }
        @keyframes hero-move {
            0% { top: 50%; right: 50%; transform: translate(50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            40% { top: 50%; right: 50%; transform: translate(50%, -50%) scale(4.5) rotate(720deg); opacity: 1; }
            100% { top: 25px; right: 25px; transform: translate(0, 0) scale(1) rotate(1440deg); opacity: 1; }
        }
        @keyframes infinite-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animating { position: fixed !important; visibility: visible !important; animation: hero-move 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .spinning-svg { animation: infinite-spin 10s linear infinite !important; transform-origin: center center; }
        #feedback { margin-top: 20px; font-size: 1.1rem; min-height: 1.5em; }
    </style>
</head>
<body>
    <div id="score-zone">
        <svg class="magen-david-svg" id="magen-svg" viewBox="0 0 100 100">
            <path d="M50 5 L92 75 L8 75 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
            <path d="M50 95 L8 25 L92 25 Z" fill="none" stroke="#0074D9" stroke-width="7" stroke-linejoin="round"/>
        </svg>
        <div id="score-count">0</div>
    </div>
    <div class="container">
        <h1>think-israel</h1>
        <p>אם שואלים אותך למה אתם עושים גנוסייד בעזה, מה ואיך היית עונה?</p>
        <textarea id="userAnswer" placeholder="כתבו כאן תשובה מכבדת ומשכנעת..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">שלח לבדיקה</button>
        <div id="feedback"></div>
    </div>

    <script>
        let score = 0;
        let lastAnswer = "";

        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value.trim();
            const feedbackDiv = document.getElementById('feedback');
            const btn = document.getElementById('checkBtn');
            const scoreZone = document.getElementById('score-zone');
            const magenSvg = document.getElementById('magen-svg');
            const scoreNum = document.getElementById('score-count');

            if (!userAnswer) return;
            btn.disabled = true;
            feedbackDiv.style.color = "white";
            feedbackDiv.innerHTML = "מנתח תשובה בשרת...";

            scoreZone.classList.remove("animating");
            magenSvg.classList.remove("spinning-svg");
            scoreNum.style.opacity = "0";
            void scoreZone.offsetWidth;

            try {
                // פנייה לפונקציית השרת המאובטחת (ללא API KEY בקוד)
                const response = await fetch("/api/check-answer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ answer: userAnswer })
                });

                const result = await response.json();

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40";
                    feedbackDiv.innerHTML = "✅ " + result.feedback;
                    if (userAnswer !== lastAnswer) { score++; lastAnswer = userAnswer; }
                    scoreZone.classList.add("animating");
                    setTimeout(() => {
                        magenSvg.classList.add("spinning-svg");
                        scoreNum.innerText = score;
                        scoreNum.style.opacity = "1";
                    }, 2500);
                } else {
                    feedbackDiv.style.color = "#FF4136";
                    feedbackDiv.innerHTML = "❌ " + result.feedback;
                }
            } catch (e) {
                feedbackDiv.innerHTML = "שגיאה בחיבור לשרת.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
