<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <style>
        body {
            background-color: #001f3f; /* כחול כהה */
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #003366;
            border: 2px solid #0074D9;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin: 20px 0;
            resize: none;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        button:disabled { background-color: #555; }

        /* מגן דוד בפינה */
        #corner-star {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 40px;
            display: none;
        }

        .rotating {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #feedback { margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="corner-star">✡️</div>

    <div class="container">
        <h1>סימולטור הסברה</h1>
        <p>שאלה: "אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת עם טיעונים חזקים?"</p>
        
        <textarea id="userAnswer" placeholder="הקלד את תשובתך כאן..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">בדיקת תשובה</button>
        
        <div id="feedback"></div>
    </div>

    <script>
        // הפונקציה מוגדרת בתוך ה-HTML כדי למנוע שגיאות טעינה
        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value;
            const feedbackDiv = document.getElementById('feedback');
            const star = document.getElementById('corner-star');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer.trim()) {
                alert("בבקשה כתוב תשובה לפני הבדיקה");
                return;
            }

            // עדכון מצב כפתור וטקסט
            btn.disabled = true;
            feedbackDiv.innerHTML = "ה-AI מנתח את התשובה שלך... <br> (זה עשוי לקחת כמה שניות)";
            feedbackDiv.style.color = "white";

            const apiKey = "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";

            const prompt = `
                תפקיד: בוחן רטוריקה והסברה.
                המשימה של המשתמש: לענות לשאלה על המצב בעזה.
                קריטריונים להצלחה:
                1. שפה מכבדת, עניינית ולא מתלהמת.
                2. הצגת טיעונים לוגיים או עובדתיים חזקים.
                תשובת המשתמש: "${userAnswer}"
                
                ענה ב-JSON בלבד:
                {"isCorrect": true/false, "feedback": "הסבר קצר בעברית"}
            `;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40"; // ירוק
                    feedbackDiv.innerHTML = "✅ <b>מעולה!</b> " + result.feedback;
                    star.style.display = "block";
                    star.classList.add("rotating");
                } else {
                    feedbackDiv.style.color = "#FF4136"; // אדום
                    feedbackDiv.innerHTML = "❌ <b>כדאי לשפר:</b> " + result.feedback;
                    star.style.display = "none";
                }
            } catch (error) {
                console.error(error);
                feedbackDiv.innerText = "שגיאה בחיבור לשרת. בדוק את חיבור האינטרנט או את מפתח ה-API.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
