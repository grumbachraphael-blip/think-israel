<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>think-israel</title>
    <style>
        body {
            background-color: #001f3f;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 5;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #003366;
            border: 2px solid #0074D9;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin: 20px 0;
            resize: none;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        /* הגדרות התמונה של המגן דוד */
        #magen-david-img {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100px; /* גודל התחלתי */
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        /* האנימציה המורכבת */
        @keyframes success-anim {
            0% {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(5) rotate(360deg); /* גדל לכל המסך */
                opacity: 1;
            }
            60% {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(5) rotate(720deg);
                opacity: 1;
            }
            100% {
                top: 40px; /* מיקום סופי בפינה */
                left: calc(100% - 60px);
                transform: translate(0, 0) scale(1) rotate(1080deg); /* חוזר לגודל רגיל בפינה */
                opacity: 1;
            }
        }

        /* סיבוב קבוע בפינה אחרי שהאנימציה נגמרת */
        @keyframes permanent-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-success {
            display: block !important;
            animation: success-anim 3s ease-in-out forwards;
        }

        .keep-spinning {
            animation: permanent-spin 4s linear infinite !important;
            top: 40px !important;
            left: calc(100% - 80px) !important;
            transform: translate(0, 0) scale(1) !important;
        }

        #feedback { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <img id="magen-david-img" src="magen-david.png" alt="Magen David">

    <div class="container">
        <h1>סימולטור הסברה</h1>
        <p>שאלה: "אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת עם טיעונים חזקים?"</p>
        <textarea id="userAnswer" placeholder="הקלד את תשובתך כאן..."></textarea>
        <br>
        <button id="checkBtn" onclick="checkAnswer()">בדיקת תשובה</button>
        <div id="feedback"></div>
    </div>

    <script>
        async function checkAnswer() {
            const userAnswer = document.getElementById('userAnswer').value;
            const feedbackDiv = document.getElementById('feedback');
            const img = document.getElementById('magen-david-img');
            const btn = document.getElementById('checkBtn');

            if (!userAnswer.trim()) {
                alert("בבקשה כתוב תשובה");
                return;
            }

            btn.disabled = true;
            feedbackDiv.style.color = "white";
            feedbackDiv.innerHTML = "ה-AI בודק...";
            
            // איפוס האנימציה אם הייתה
            img.classList.remove("animate-success", "keep-spinning");
            void img.offsetWidth; 

            const apiKey = "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";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `בדוק אם התשובה הבאה מכבדת ומשכנעת לגבי עזה: "${userAnswer}". החזר JSON: {"isCorrect": true/false, "feedback": "..."}` }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.isCorrect) {
                    feedbackDiv.style.color = "#2ECC40";
                    feedbackDiv.innerHTML = "✅ " + result.feedback;
                    
                    // שלב 1: האנימציה הגדולה
                    img.classList.add("animate-success");
                    
                    // שלב 2: אחרי 3 שניות (כשנגמרת האנימציה) - תעבור לסיבוב קבוע בפינה
                    setTimeout(() => {
                        img.classList.remove("animate-success");
                        img.classList.add("keep-spinning");
                        img.style.opacity = "1";
                    }, 3000);

                } else {
                    feedbackDiv.style.color = "#FF4136";
                    feedbackDiv.innerHTML = "❌ " + result.feedback;
                }
            } catch (error) {
                feedbackDiv.innerText = "שגיאה בחיבור.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
