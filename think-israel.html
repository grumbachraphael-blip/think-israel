<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בדיקה AI</title>
    <style>
        body {
            background-color: #001f3f; /* כחול כהה */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #003366;
            border: 2px solid #0074D9;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            background-color: #0074D9;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover { background-color: #7FDBFF; }

        /* אנימציית מגן דוד */
        #star-container {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 40px;
            display: none;
        }

        .rotating-star {
            display: inline-block;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #feedback { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="star-container">✡️</div>

    <div class="container">
        <h2>שאלה:</h2>
        <p>אם שואלים אותך על המצב בעזה, מה ואיך היית עונה בצורה מכבדת ומשכנעת?</p>
        
        <textarea id="userAnswer" placeholder="כתוב את תשובתך כאן..."></textarea>
        <br>
        <button onclick="checkAnswer()">שלח לבדיקה</button>
        
        <div id="feedback"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
